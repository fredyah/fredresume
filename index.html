<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fred Yeh 技術面試簡報 - DevOps / AI System Engineer</title>
  <style>

    :root {
      --bg-main: #0f172a;
      --bg-card: #1e293b;
      --bg-soft: rgba(20, 184, 166, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --accent-teal: #14b8a6;
      --accent-purple: #a855f7;
      --accent-amber: #f59e0b;
      --accent-blue: #38bdf8;
      --border-color: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top right, rgba(20, 184, 166, 0.16), transparent 30%),
                  radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.14), transparent 28%),
                  var(--bg-main);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      overflow: hidden;
    }

    .deck-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      padding: 42px 64px;
      opacity: 1;
      transform: scale(1);
      transition: opacity 0.35s ease, transform 0.35s ease;
      display: flex;
      flex-direction: column;
    }

    .slide.is-changing { opacity: 0; transform: scale(0.985); }

    .slide-header {
      border-left: 5px solid var(--accent-teal);
      padding-left: 16px;
      margin-bottom: 28px;
      flex-shrink: 0;
    }

    .slide-header.hidden { display: none; }

    .slide-header h2 {
      font-size: 25pt;
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.25;
    }

    .slide-header .subheader {
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 12pt;
      line-height: 1.5;
    }

    .slide-content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 54px;
    }

    .slide-footer {
      position: absolute;
      left: 64px;
      right: 64px;
      bottom: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
      font-size: 10pt;
      pointer-events: auto;
    }

    .footer-left, .footer-page { white-space: nowrap; }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .controls button {
      background: var(--bg-card);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 10pt;
    }

    .controls button:hover {
      background: var(--accent-teal);
      color: #062320;
      border-color: var(--accent-teal);
    }

    .controls button[aria-pressed="true"],
    .controls button.active-lang {
      background: rgba(20, 184, 166, 0.22);
      border-color: var(--accent-teal);
      color: var(--accent-teal);
    }

    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px; }

    .card {
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 8px 26px rgba(0,0,0,0.16);
    }

    .card.em {
      border-color: rgba(20, 184, 166, 0.75);
      background: linear-gradient(180deg, rgba(20, 184, 166, 0.10), rgba(30, 41, 59, 0.94));
    }

    .card.purple {
      border-color: rgba(168, 85, 247, 0.75);
      background: linear-gradient(180deg, rgba(168, 85, 247, 0.10), rgba(30, 41, 59, 0.94));
    }

    .card h3 { font-size: 15pt; margin-bottom: 12px; color: var(--accent-teal); line-height: 1.35; }
    .card h4 { font-size: 13pt; margin-bottom: 8px; color: var(--text-main); line-height: 1.4; }

    p { color: var(--text-main); line-height: 1.65; font-size: 12pt; }
    .muted { color: var(--text-muted); }
    .highlight { color: var(--accent-teal); font-weight: 700; }

    .interview-cta-wrap { margin-top: 22px; display: flex; justify-content: center; }

    .interview-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-radius: 999px;
      border: 1px solid rgba(20, 184, 166, 0.55);
      background: linear-gradient(135deg, rgba(20, 184, 166, 0.22), rgba(56, 189, 248, 0.12));
      color: var(--text-main);
      font-size: 12pt;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.02em;
      box-shadow: 0 10px 24px rgba(20, 184, 166, 0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .interview-cta:hover {
      transform: translateY(-2px);
      border-color: var(--accent-teal);
      box-shadow: 0 14px 30px rgba(20, 184, 166, 0.3);
    }

    .interview-cta:focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 3px; }
    .purple-text { color: var(--accent-purple); font-weight: 700; }

    ul { list-style: none; }

    li {
      position: relative;
      padding-left: 20px;
      margin-bottom: 11px;
      color: var(--text-main);
      font-size: 11.5pt;
      line-height: 1.55;
    }

    li::before {
      content: "▹";
      position: absolute;
      left: 0;
      top: 0;
      color: var(--accent-teal);
      font-weight: 900;
    }

    .badge {
      display: inline-block;
      margin: 4px 4px 5px 0;
      padding: 4px 10px;
      border: 1px solid rgba(20, 184, 166, 0.25);
      border-radius: 999px;
      background: rgba(20, 184, 166, 0.10);
      color: var(--accent-teal);
      font-size: 10.2pt;
      font-weight: 650;
      white-space: nowrap;
    }

    .badge.purple {
      color: #d8b4fe;
      border-color: rgba(168, 85, 247, 0.35);
      background: rgba(168, 85, 247, 0.13);
    }

    .metric-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-top: 22px; }

    .metric {
      padding: 16px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.72);
    }

    .metric .num { font-size: 18pt; color: var(--accent-teal); font-weight: 800; margin-bottom: 6px; }
    .metric .label { font-size: 10.5pt; color: var(--text-muted); line-height: 1.45; }

    .cover-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 980px;
      margin: 0 auto;
      height: 100%;
    }

    .cover-title {
      font-size: 39pt;
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #ffffff, #67e8f9, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 18px;
    }

    .cover-subtitle {
      font-size: 16pt;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 28px;
    }

    .quote {
      padding: 18px 20px;
      border-left: 4px solid var(--accent-purple);
      background: rgba(168, 85, 247, 0.08);
      border-radius: 10px;
      color: var(--text-main);
      line-height: 1.7;
      font-size: 12pt;
    }

    .timeline { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px; position: relative; }
    .timeline-card { border-top: 4px solid var(--accent-teal); }
    .timeline-card:nth-child(2) { border-top-color: var(--accent-purple); }
    .timeline-card:nth-child(3) { border-top-color: var(--accent-amber); }
    .timeline-card:nth-child(4) { border-top-color: var(--accent-blue); }

    pre {
      background: #020617;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 16px;
      color: #7dd3fc;
      font-family: "Fira Code", Consolas, Monaco, monospace;
      font-size: 10.5pt;
      line-height: 1.55;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(30, 41, 59, 0.92);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
      font-size: 11.3pt;
      line-height: 1.55;
      vertical-align: top;
    }

    th { color: var(--accent-teal); background: rgba(20, 184, 166, 0.11); font-size: 11pt; }
    tr:last-child td { border-bottom: none; }
    .small-note { margin-top: 18px; color: var(--text-muted); font-size: 10.8pt; line-height: 1.6; }

    @media (max-width: 900px) {
      .slide { padding: 28px 28px; }
      .slide-footer { left: 28px; right: 28px; align-items: flex-start; gap: 10px; }
      .grid-2, .grid-3, .grid-4, .cover-wrap, .timeline, .metric-row { grid-template-columns: 1fr; }
      .cover-title { font-size: 29pt; }
      .slide-header h2 { font-size: 21pt; }
      .footer-left { display: none; }
    }

  </style>
</head>

            },
            {

                  "footerLeft": "Fred Yeh | 面試簡報",
                  "content": "\n        <div class=\"timeline\">\n          <div class=\"card timeline-card\"><h3>業務與現場經驗</h3><p class=\"muted\">國內業務、房仲、保險業務</p><ul><li>建立客戶溝通、需求釐清、跨部門協調能力。</li><li>能理解技術方案背後的成本、交期與使用者需求。</li></ul></div>\n          <div class=\"card timeline-card\"><h3>硬體與系統基礎</h3><p class=\"muted\">維修工程師、系統工程師</p><ul><li>熟悉 Linux、NGINX、雲端基礎服務與地端機房場景。</li><li>理解硬體、網路、VM、NAS 與服務部署之間的關聯。</li></ul></div>\n          <div class=\"card timeline-card\"><h3>DevOps 與平台維運</h3><p class=\"muted\">K8s、Docker、CI/CD、監控告警</p><ul><li>具備 GitLab Runner、Dockerfile、Pipeline、Kubernetes、Grafana、Prometheus 等經驗。</li><li>能以腳本、自動化與告警機制降低人工維運成本。</li></ul></div>\n          <div class=\"card timeline-card\"><h3>AI 系統工程</h3><p class=\"muted\">Local LLM、RAG、Backend API</p><ul><li>建置 Ollama、vLLM、n8n、RAG、Milvus、Hugging Face 相關環境。</li><li>參與 Python / C# API 與 AI 應用後端整合。</li></ul></div>\n        </div>\n        <div class=\"quote\" style=\"margin-top: 26px;\">我的優勢不是只會某一套工具，而是能把「需求、基礎設施、後端 API、容器平台、AI 模型與維運流程」串成可落地的系統方案。</div>\n      "

    function stopSlideAudio() {

    function playSlideAudio(index) {
      if (!isSlideAudioEnabled) return;

        slideAudio.src = slideAudioPath(index);

      isSlideAudioEnabled = !isSlideAudioEnabled;
      localStorage.setItem(AUDIO_AUTOPLAY_KEY, isSlideAudioEnabled ? 'on' : 'off');
      updateButtons();
      if (!isSlideAudioEnabled) {
        stopSlideAudio();
      } else {
        loadedAudioKey = '';
        playSlideAudio(currentSlide);
      }
    });

    langZhBtn.addEventListener('click', () => setLanguage('zh'));
    langEnBtn.addEventListener('click', () => setLanguage('en'));
    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);

    document.addEventListener('keydown', (e) => {
      if (['ArrowRight', 'PageDown', ' '].includes(e.key)) nextSlide();
      if (['ArrowLeft', 'PageUp'].includes(e.key)) prevSlide();
      if (e.key === 'Home') showSlide(1);
      if (e.key === 'End') showSlide(totalSlides);
      if (e.key.toLowerCase() === 'z') setLanguage('zh');
      if (e.key.toLowerCase() === 'e') setLanguage('en');
    });

    initSlideAudioPreference();
    renderSlide(currentSlide);
    if (isSlideAudioEnabled) playSlideAudio(currentSlide);
  </script>
</body>
</html>
